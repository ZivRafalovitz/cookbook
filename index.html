<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>📖 הספר שלי</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#FAF8F4;--bg2:#EDE8DF;--bg3:#E8E2D8;--text:#1C1A16;--text2:#6B5C45;--text3:#A89880;--amber:#C8902A;--white:#FFFFFF;--danger:#B85C38;--r:16px;}
html,body{height:100%;background:var(--bg);}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-tap-highlight-color:transparent;overflow-x:hidden;}
.app{max-width:430px;margin:0 auto;padding:0 0 90px;min-height:100vh;}
.topbar{padding:20px 16px 12px;}
.app-title{font-size:28px;font-weight:600;color:var(--text);letter-spacing:-0.5px;margin-bottom:14px;}
.search-wrap{position:relative;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--text3);pointer-events:none;}
.search-input{width:100%;padding:11px 12px 11px 38px;border-radius:14px;border:none;background:var(--bg2);color:var(--text);font-size:15px;font-family:inherit;}
.search-input::placeholder{color:var(--text3);}
.search-input:focus{outline:2px solid var(--amber);background:var(--bg3);}
.filter-row{padding:12px 16px 4px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.pill{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:var(--bg2);color:var(--text2);white-space:nowrap;user-select:none;}
.pill.active{background:var(--text);color:var(--bg);}
.count-bar{padding:10px 16px 6px;font-size:12px;color:var(--text3);font-weight:500;letter-spacing:0.3px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
.btn-import{font-size:11px;padding:4px 10px;border-radius:8px;border:0.5px solid var(--amber);background:transparent;color:var(--amber);cursor:pointer;font-weight:500;}
.cards{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--white);border-radius:var(--r);overflow:hidden;display:flex;}
.card-accent{width:5px;flex-shrink:0;}
.card-body{flex:1;padding:14px 14px 14px 16px;min-width:0;}
.card-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px;}
.card-title{font-size:17px;font-weight:500;color:var(--text);line-height:1.25;letter-spacing:-0.2px;}
.type-chip{display:flex;align-items:center;gap:4px;background:var(--bg);border-radius:8px;padding:3px 8px;font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0;}
.cat-badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:6px;display:inline-block;margin-bottom:6px;}
.card-notes{font-size:13px;color:var(--text2);line-height:1.55;}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg2);color:var(--text2);}
.tag.method{background:var(--text);color:var(--bg);}
.card-source{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);margin-top:6px;font-weight:500;}
.card-link{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--amber);text-decoration:none;margin-top:6px;font-weight:500;word-break:break-all;}
.card-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid #F0EBE2;}
.btn-act{flex:1;padding:9px;border-radius:10px;border:none;background:var(--bg);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
.btn-del{color:var(--danger);}
.empty{text-align:center;padding:4rem 1rem;color:var(--text3);font-size:14px;}
.fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);border:none;border-radius:30px;padding:15px 32px;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;z-index:50;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.2);}
.overlay{position:fixed;inset:0;background:rgba(28,26,22,0.5);z-index:100;display:flex;align-items:flex-end;}
.sheet{background:var(--bg);border-radius:24px 24px 0 0;width:100%;padding:14px 16px 36px;display:flex;flex-direction:column;gap:13px;max-height:92vh;overflow-y:auto;}
.sheet-handle{width:40px;height:4px;background:#D4C9B8;border-radius:2px;margin:0 auto 6px;}
.sheet-title{font-size:20px;font-weight:500;color:var(--text);letter-spacing:-0.3px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:12px;font-weight:500;color:var(--text3);letter-spacing:0.3px;text-transform:uppercase;}
.field-hint{font-size:11px;color:var(--text3);margin-top:2px;}
.field input,.field textarea,.field select{padding:12px 14px;border-radius:12px;border:none;background:var(--bg2);color:var(--text);font-size:15px;font-family:inherit;width:100%;}
.field textarea{resize:none;height:80px;}
.field input:focus,.field textarea:focus,.field select:focus{outline:2px solid var(--amber);background:var(--bg3);}
.method-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px;}
.mchip{padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;border:none;background:var(--bg2);color:var(--text2);user-select:none;}
.mchip.sel{background:var(--text);color:var(--bg);}
.sheet-actions{display:flex;gap:8px;margin-top:4px;}
.btn-save{flex:1;padding:14px;border-radius:14px;border:none;background:var(--text);color:var(--bg);font-size:15px;font-weight:500;cursor:pointer;}
.btn-cancel{padding:14px 18px;border-radius:14px;border:none;background:var(--bg2);color:var(--text2);font-size:15px;font-weight:500;cursor:pointer;}
.import-overlay{position:fixed;inset:0;background:rgba(28,26,22,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.import-box{background:var(--bg);border-radius:20px;padding:20px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:12px;}
.import-box h3{font-size:17px;font-weight:500;color:var(--text);}
.import-box p{font-size:13px;color:var(--text2);line-height:1.5;}
.import-box textarea{padding:10px;border-radius:10px;border:none;background:var(--bg2);color:var(--text);font-size:13px;height:120px;resize:none;font-family:monospace;width:100%;}
.import-actions{display:flex;gap:8px;}
.btn-do-import{flex:1;padding:12px;border-radius:12px;border:none;background:var(--text);color:var(--bg);font-size:14px;font-weight:500;cursor:pointer;}
.btn-do-cancel{padding:12px 16px;border-radius:12px;border:none;background:var(--bg2);color:var(--text2);font-size:14px;cursor:pointer;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="app-title">📖 הספר שלי</div>
    <div class="search-wrap">
      <i class="ti ti-search search-icon"></i>
      <input class="search-input" id="searchInput" placeholder="חיפוש מתכון, תגית, שיטה..." oninput="render()">
    </div>
  </div>
  <div class="filter-row" id="filterRow"></div>
  <div class="count-bar">
    <span id="countBar"></span>
    <button class="btn-import" onclick="openImport()">⬆ ייבוא JSON</button>
  </div>
  <div class="cards" id="cards"></div>
</div>

<button class="fab" onclick="openSheet()"><i class="ti ti-plus"></i> הוסף פריט</button>

<div class="overlay" id="overlay" style="display:none" onclick="overlayClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheetTitle">פריט חדש</div>
    <div class="field"><label>כותרת</label><input id="fTitle" placeholder="שם המתכון..."></div>
    <div class="field"><label>לינק</label><input id="fUrl" type="url" placeholder="https://..." inputmode="url"></div>
    <div class="field"><label>סוג</label>
      <select id="fType">
        <option value="link">🔗 לינק / אתר</option>
        <option value="youtube">▶ יוטיוב</option>
        <option value="facebook">📘 פייסבוק</option>
        <option value="text">📝 טקסט / הערות</option>
      </select>
    </div>
    <div class="field"><label>קטגוריה</label><select id="fCat"></select></div>
    <div class="field"><label>שיטת בישול</label><div class="method-chips" id="methodChips"></div></div>
    <div class="field"><label>תגיות נוספות</label><input id="fTags" placeholder="ים תיכוני, חג, קיץ..."><div class="field-hint">מופרדות בפסיק</div></div>
    <div class="field"><label>מקור</label><input id="fSource" placeholder="השולחן, קבוצת BBQ ישראל..."></div>
    <div class="field"><label>הערות</label><textarea id="fNotes" placeholder="זמנים, טמפרטורות, טכניקה..."></textarea></div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeSheet()">ביטול</button>
      <button class="btn-save" onclick="saveItem()">שמור</button>
    </div>
  </div>
</div>

<div class="import-overlay" id="importOverlay" style="display:none">
  <div class="import-box">
    <h3>ייבוא JSON</h3>
    <p>הדבק JSON שקיבלת מג׳מיני. הפריטים יתווספו לקיימים.</p>
    <textarea id="importText" placeholder='[{"title":"...", "url":"...", ...}]'></textarea>
    <div class="import-actions">
      <button class="btn-do-cancel" onclick="closeImport()">ביטול</button>
      <button class="btn-do-import" onclick="doImport()">ייבא</button>
    </div>
  </div>
</div>

", "type": "link", "cat": "דגים", "methods": "גריל", "tags": "", "source": "", "notes": ""}];

let items=[],editId=null,activeF='הכל',selMethods=new Set();

function load(){
  try{items=JSON.parse(localStorage.getItem(SK))||[];}catch(e){items=[];}
  if(!items.length){items=SEED.map(i=>({...i,id:uid()}));save();}
}
function save(){localStorage.setItem(SK,JSON.stringify(items));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function parseTags(s){return(s||'').split(',').map(t=>t.trim()).filter(Boolean);}

function match(item,q){
  if(!q)return true;
  const words=q.trim().split(/\s+/).filter(Boolean);
  const hay=[item.title,item.notes,item.cat,item.source,item.tags,item.methods].join(' ').toLowerCase();
  return words.every(w=>hay.includes(w));
}

function renderPills(){
  document.getElementById('filterRow').innerHTML=['הכל',...CATS].map(c=>
    `<span class="pill${activeF===c?' active':''}" onclick="setFilter('${esc(c)}')">${esc(c)}</span>`
  ).join('');
}
function setFilter(c){activeF=c;renderPills();render();}

function render(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const list=items.filter(i=>(activeF==='הכל'||i.cat===activeF)&&match(i,q));
  document.getElementById('countBar').textContent=`${list.length} פריטים`;
  if(!list.length){document.getElementById('cards').innerHTML='<div class="empty">אין פריטים</div>';return;}
  document.getElementById('cards').innerHTML=list.map(item=>{
    const ic=TICONS[item.type]||'ti-file';
    const m=META[item.cat]||{accent:'#C8902A',badge:{bg:'#FFF3DC',tx:'#8A5E00'}};
    const badge=item.cat?`<div class="cat-badge" style="background:${m.badge.bg};color:${m.badge.tx}">${esc(item.cat)}</div>`:'';
    const notes=item.notes?`<div class="card-notes">${esc(item.notes)}</div>`:'';
    const methods=parseTags(item.methods).map(t=>`<span class="tag method">${esc(t)}</span>`);
    const tags=parseTags(item.tags).map(t=>`<span class="tag">${esc(t)}</span>`);
    const tagsHtml=[...methods,...tags].length?`<div class="card-tags">${[...methods,...tags].join('')}</div>`:'';
    const source=item.source?`<div class="card-source"><i class="ti ti-user"></i>${esc(item.source)}</div>`:'';
    const link=item.url?`<a class="card-link" href="${esc(item.url)}" target="_blank" rel="noopener"><i class="ti ti-external-link"></i>${esc(item.url.replace(/^https?:\/\//,'').split('/')[0])}</a>`:'';
    return`<div class="card">
      <div class="card-accent" style="background:${m.accent}"></div>
      <div class="card-body">
        <div class="card-row1"><div class="card-title">${esc(item.title)}</div><div class="type-chip"><i class="ti ${ic}"></i>${TLABELS[item.type]||''}</div></div>
        ${badge}${notes}${tagsHtml}${source}${link}
        <div class="card-actions">
          <button class="btn-act" onclick="openSheet('${item.id}')"><i class="ti ti-edit"></i> עריכה</button>
          <button class="btn-act btn-del" onclick="del('${item.id}')"><i class="ti ti-trash"></i> מחק</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function buildMethodChips(sel){
  selMethods=new Set(parseTags(sel));
  document.getElementById('methodChips').innerHTML=METHODS.map(m=>
    `<span class="mchip${selMethods.has(m)?' sel':''}" onclick="toggleMethod('${esc(m)}')">${esc(m)}</span>`
  ).join('');
}
function toggleMethod(m){
  selMethods.has(m)?selMethods.delete(m):selMethods.add(m);
  document.getElementById('methodChips').querySelectorAll('.mchip').forEach(el=>el.classList.toggle('sel',selMethods.has(el.textContent)));
}

function openSheet(id){
  editId=id||null;
  const item=id?items.find(i=>i.id===id):null;
  document.getElementById('sheetTitle').textContent=id?'עריכת פריט':'פריט חדש';
  document.getElementById('fTitle').value=item?.title||'';
  document.getElementById('fUrl').value=item?.url||'';
  document.getElementById('fType').value=item?.type||'link';
  document.getElementById('fTags').value=item?.tags||'';
  document.getElementById('fSource').value=item?.source||'';
  document.getElementById('fNotes').value=item?.notes||'';
  document.getElementById('fCat').innerHTML=CATS.map(c=>`<option value="${esc(c)}"${c===item?.cat?' selected':''}>${esc(c)}</option>`).join('');
  buildMethodChips(item?.methods||'');
  document.getElementById('overlay').style.display='flex';
  setTimeout(()=>document.getElementById('fTitle').focus(),120);
}
function closeSheet(){document.getElementById('overlay').style.display='none';editId=null;}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeSheet();}

function saveItem(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){document.getElementById('fTitle').focus();return;}
  const obj={id:editId||uid(),title,url:document.getElementById('fUrl').value.trim(),type:document.getElementById('fType').value,cat:document.getElementById('fCat').value,methods:[...selMethods].join(','),tags:document.getElementById('fTags').value.trim(),source:document.getElementById('fSource').value.trim(),notes:document.getElementById('fNotes').value.trim()};
  if(editId){const idx=items.findIndex(i=>i.id===editId);if(idx>-1)items[idx]=obj;}
  else items.unshift(obj);
  save();closeSheet();renderPills();render();
}
function del(id){
  if(!confirm('למחוק?'))return;
  items=items.filter(i=>i.id!==id);save();renderPills();render();
}

function openImport(){document.getElementById('importOverlay').style.display='flex';}
function closeImport(){document.getElementById('importOverlay').style.display='none';document.getElementById('importText').value='';}
function doImport(){
  try{
    const data=JSON.parse(document.getElementById('importText').value.trim());
    if(!Array.isArray(data))throw new Error();
    let added=0;
    data.forEach(item=>{
      if(!item.title)return;
      items.unshift({id:uid(),title:item.title||'',url:item.url||'',type:item.type||'link',cat:item.cat||'אחר',methods:item.methods||'',tags:item.tags||'',source:item.source||'',notes:item.notes||''});
      added++;
    });
    save();closeImport();renderPills();render();
    alert(`יובאו ${added} פריטים`);
  }catch(e){alert('שגיאה ב-JSON');}
}

load();renderPills();render();
</script>
